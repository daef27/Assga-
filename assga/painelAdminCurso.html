<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Admin Cursos - ASSGA</title>
<link rel="stylesheet" href="painelAdminCurso.css">
</head>
<body>

<!-- Overlay de login -->
<div id="loginOverlay" class="login-overlay">
  <div class="login-card">
    <h2>Login do Administrador</h2>
    <input type="text" id="cpf" placeholder="CPF">
    <input type="password" id="senha" placeholder="Senha">
    <button onclick="loginAdmin()">Entrar</button>
    <p id="msgErro" class="erro"></p>
  </div>
</div>

<!-- Painel Admin -->
<div id="painelContent" style="display:none;">
<header>
  <h1>Painel Admin - Cursos</h1>
  <p>Lista de alunos inscritos em tempo real</p>
</header>

<section class="filtro">
  <label for="filtrarCurso">Filtrar por Curso:</label>
  <select id="filtrarCurso" onchange="atualizarTabela()">
    <option value="Todos">Todos</option>
  </select>
</section>

<section class="tabela-container">
  <table id="tabelaInscricoes">
    <thead>
      <tr>
        <th>Nome</th>
        <th>Email</th>
        <th>Curso</th>
        <th>Valor</th>
        <th>Ação</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td colspan="5" style="text-align:center; padding:20px; color:#00ffff;">
          Nenhum aluno inscrito até o momento.
        </td>
      </tr>
    </tbody>
  </table>
</section>

<section class="total">
  <p>Total Arrecadado: R$ <span id="totalArrecadado">0.00</span></p>
</section>
</div>

<script src="painelAdminCurso.js"></script>
<script>
const adminCPF = "12345678900";
const adminSenha = "admin123";

function loginAdmin() {
    const cpf = document.getElementById('cpf').value.trim();
    const senha = document.getElementById('senha').value.trim();
    const msgErro = document.getElementById('msgErro');

    if(cpf === adminCPF && senha === adminSenha){
        // Esconde overlay e mostra painel
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('painelContent').style.display = 'block';
    } else {
        msgErro.innerText = "CPF ou senha incorretos!";
    }
}
</script>
</body>
</html>
